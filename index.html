<script>
    let invoiceList = [];
    let lastCalculatedPrice = 0;
    let lastCalculatedDesc = '';
    let lastCalculatedQty = '';

    function formatInput(input) {
        let value = input.value.replace(/,/g, '');
        if(!isNaN(value) && value !== "") input.value = Number(value).toLocaleString();
    }

    // مبدل خودکار مثقال بازار به گرم ۱۸ عیار
    function convertMithqal(input) {
        formatInput(input);
        let val = parseFloat(input.value.replace(/,/g, '')) || 0;
        if(val > 0) {
            let gram18 = val / 4.3318;
            document.getElementById('globalGoldPrice').value = Math.round(gram18).toLocaleString();
        } else {
            document.getElementById('globalGoldPrice').value = '';
        }
    }

    // تابع اصلی و واقعی برای دریافت نرخ لحظه‌ای بازار طلا
    async function fetchLivePrice() {
        const btn = document.querySelector('.update-btn');
        const mInput = document.getElementById('mithqalInput');
        const gInput = document.getElementById('globalGoldPrice');
        
        btn.innerText = "⏳ دریافت نرخ زنده...";
        btn.disabled = true;

        try {
            // فراخوانی مستقیم نرخ زنده طلا و مظنه از سرورهای بازار ایران
            const response = await fetch('https://api.keybit.ir/gold/');
            if (!response.ok) throw new Error('خطا در پاسخ سرور');
            
            const data = await response.json();
            
            let liveMithqal = 0;
            let liveGram18 = 0;

            // استخراج هوشمند اطلاعات بر اساس ساختارهای مختلف داده‌ای بازار
            if (data && data.gold) {
                // دریافت قیمت مظنه (مثقال)
                liveMithqal = parseInt(data.gold.mazneh || data.gold.mithqal || data.gold.mesghal) || 0;
                // دریافت قیمت گرم 18 عیار
                liveGram18 = parseInt(data.gold.geram18 || data.gold.gram18) || 0;
            }

            // بررسی نهایی و اعمال روی ماشین حساب
            if (liveMithqal > 0) {
                mInput.value = liveMithqal.toLocaleString();
                gInput.value = Math.round(liveMithqal / 4.3318).toLocaleString();
            } else if (liveGram18 > 0) {
                gInput.value = liveGram18.toLocaleString();
                mInput.value = Math.round(liveGram18 * 4.3318).toLocaleString();
            } else {
                throw new Error('دیتای دریافتی معتبر نیست');
            }
            
            // ایجاد افکت درخشش طلایی در کادرها برای اطمینان از به‌روزرسانی موفق
            gInput.classList.add('highlight-update');
            mInput.classList.add('highlight-update');
            setTimeout(() => {
                gInput.classList.remove('highlight-update');
                mInput.classList.remove('highlight-update');
            }, 1000);

            btn.innerText = "✅ نرخ به‌روز شد";

        } catch (error) {
            console.error("Price fetch failed:", error);
            alert("سرور نرخ‌دهی مرکزی موقتاً شلوغ است. نرخ جدید را دستی وارد کنید، مبالغ قبلی شما حفظ شده‌اند.");
            btn.innerText = "❌ خطا در اتصال";
        } finally {
            btn.disabled = false;
            setTimeout(() => { btn.innerText = "🔄 بروزرسانی نرخ"; }, 2500);
        }
    }

    function switchTab(tab) {
        document.getElementById('goldSection').style.display = tab === 'gold' ? 'block' : 'none';
        document.getElementById('meltingSection').style.display = tab === 'melting' ? 'block' : 'none';
        document.getElementById('coinSection').style.display = tab === 'coin' ? 'none' : 'none';
        
        if(tab === 'coin') {
            document.getElementById('coinSection').style.display = 'block';
        }
        
        document.getElementById('btnTabGold').classList.toggle('active', tab === 'gold');
        document.getElementById('btnTabMelting').classList.toggle('active', tab === 'melting');
        document.getElementById('btnTabCoin').classList.toggle('active', tab === 'coin');
    }

    function toggleSecondHand(checkbox) {
        document.getElementById('wage').value = checkbox.checked ? 0 : 15;
        document.getElementById('tax').value = checkbox.checked ? 0 : 9;
        document.getElementById('wage').disabled = checkbox.checked;
        document.getElementById('tax').disabled = checkbox.checked;
    }

    function getBasePrice() {
        const p = parseFloat(document.getElementById('globalGoldPrice').value.replace(/,/g, '')) || 0;
        if(p === 0) alert("لطفاً ابتدا قیمت مبنا را دستی وارد کنید یا دکمه بروزرسانی را بزنید.");
        return p;
    }

    function calculateGold() {
        const gold18 = getBasePrice(); if(!gold18) return;
        const carat = parseFloat(document.getElementById('caratSelect').value);
        const weight = parseFloat(document.getElementById('weight').value) || 0;
        const stone = parseFloat(document.getElementById('stoneWeight').value) || 0;
        const netWeight = weight - stone;
        if(netWeight <= 0) { alert("وزن خالص نامعتبر است."); return; }

        let perGramPrice = gold18;
        if(carat === 21) perGramPrice = (gold18 / 750) * 875;
        if(carat === 24) perGramPrice = (gold18 / 750) * 995;

        const raw = perGramPrice * netWeight;
        const wage = raw * (parseFloat(document.getElementById('wage').value) || 0) / 100;
        const profit = (raw + wage) * (parseFloat(document.getElementById('profit').value) || 0) / 100;
        const tax = (wage + profit) * (parseFloat(document.getElementById('tax').value) || 0) / 100;
        const total = raw + wage + profit + tax;

        document.getElementById('resNetWeight').innerText = netWeight.toFixed(3);
        document.getElementById('resConvertPrice').innerText = Math.round(perGramPrice).toLocaleString();
        document.getElementById('resTotal').innerText = Math.round(total).toLocaleString();
        document.getElementById('goldResultBox').style.display = 'block';

        lastCalculatedPrice = Math.round(total);
        lastCalculatedDesc = `طلای ${carat} عیار ` + (document.getElementById('isSecondHand').checked ? '(دست دوم)' : '');
        lastCalculatedQty = `${netWeight.toFixed(3)} گرم`;
    }

    function calculateMelting() {
        const gold18 = getBasePrice(); if(!gold18) return;
        const w = parseFloat(document.getElementById('meltedWeight').value) || 0;
        const c = parseFloat(document.getElementById('meltedCarat').value) || 0;
        if(w===0 || c===0) return;

        const w18 = (w * c) / 750;
        const total = w18 * gold18;

        document.getElementById('resConverted18Weight').innerText = w18.toFixed(3);
        document.getElementById('resMeltingTotal').innerText = Math.round(total).toLocaleString();
        document.getElementById('meltingResultBox').style.display = 'block';

        lastCalculatedPrice = Math.round(total);
        lastCalculatedDesc = `آبشده (${c})`;
        lastCalculatedQty = `${w.toFixed(3)} گرم`;
    }

    function calculateCoin() {
        const gold18 = getBasePrice(); if(!gold18) return;
        const select = document.getElementById('coinType');
        const coinName = select.value;
        const coinW = parseFloat(select.options[select.selectedIndex].getAttribute('data-weight'));
        const marketP = parseFloat(document.getElementById('coinMarketPrice').value.replace(/,/g, '')) || 0;
        const count = parseInt(document.getElementById('coinCount').value) || 1;
        if(!marketP) return;

        const realValuePerCoin = ((gold18 / 750) * 900) * coinW;
        const bubble = marketP - realValuePerCoin;
        const total = marketP * count;

        document.getElementById('resCoinSingleBubble').innerText = Math.round(bubble).toLocaleString();
        document.getElementById('resCoinTotal').innerText = Math.round(total).toLocaleString();
        document.getElementById('coinResultBox').style.display = 'block';

        lastCalculatedPrice = Math.round(total);
        lastCalculatedDesc = coinName;
        lastCalculatedQty = `${count} عدد`;
    }

    function addToInvoice(type) {
        if(type === 'gold') calculateGold();
        if(type === 'melting') calculateMelting();
        if(type === 'coin') calculateCoin();
        if(lastCalculatedPrice === 0) return;

        invoiceList.push({ desc: lastCalculatedDesc, qty: lastCalculatedQty, price: lastCalculatedPrice });
        renderInvoice();
        lastCalculatedPrice = 0;
    }

    function renderInvoice() {
        const tbody = document.getElementById('invoiceItems');
        if(invoiceList.length === 0) {
            tbody.innerHTML = `<tr><td colspan="3" style="text-align: center; color: #666;">هیچ کالایی اضافه نشده است.</td></tr>`;
            document.getElementById('invoiceGrandTotal').innerText = '۰';
            return;
        }
        let html = ''; let grandTotal = 0;
        invoiceList.forEach((item) => {
            html += `<tr><td>${item.desc}</td><td>${item.qty}</td><td>${item.price.toLocaleString()}</td></tr>`;
            grandTotal += item.price;
        });
        tbody.innerHTML = html;
        document.getElementById('invoiceGrandTotal').innerText = grandTotal.toLocaleString();
    }

    function clearInvoice() { invoiceList = []; renderInvoice(); }

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('service-worker.js');
        });
    }
</script>
